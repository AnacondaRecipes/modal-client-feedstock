{% set name = "modal-client" %}
{% set version = "1.3.0.post1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/modal/modal-{{ version }}.tar.gz
  sha256: e86b62c6cfd5c4b40fdf7bcf078d24e4ed7730d2d0b7c70dc3225a36e85067a4

build:
  number: 0
  skip: true  # [py<310]
  entry_points:
    - modal = modal.__main__:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - setuptools  # upstream pins ~=77.0.3; no 77.x on pkgs/main, builds fine with newer
    - wheel
  run:
    - python
    - aiohttp
    - cbor2
    - certifi
    - click >=8.1,<9
    - grpclib >=0.4.7,<0.4.10
    - protobuf >=3.19,<7.0,!=4.24.0
    - rich >=12.0.0
    - synchronicity >=0.11.1,<0.12
    - toml
    - typer >=0.9
    - types-certifi
    - types-toml
    - watchfiles
    - typing_extensions >=4.6,<5

test:
  imports:
    - modal
    - modal_docs
    - modal_proto
    - modal_version
  commands:
    - pip check
    - modal --help
  requires:
    - pip

about:
  home: https://modal.com
  summary: Python client library for Modal
  description: |
    modal is the Python client library for Modal, a serverless cloud platform
    for running code (functions, apps, and scheduled jobs) in the cloud with
    minimal configuration. This package provides the `modal` CLI and the Python
    SDK used to define and deploy Modal apps. It is published on PyPI as `modal`
    and packaged here as `modal-client` to avoid the conda name collision with
    the unrelated modAL active-learning library.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  doc_url: https://modal.com/docs
  dev_url: https://github.com/modal-labs/modal-client

extra:
  recipe-maintainers:
    - thomasjpfan
    - devennavani
    - aksh-at
    - erikbern
    - freider
    - mwaskom
